name: Reply-schemas linter

on:
  push:
    paths:
      - 'src/commands/*.json'
  pull_request:
    paths:
      - 'src/commands/*.json'

concurrency:
  group: reply-schemas-linter-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reply-schemas-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup nodejs
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      - name: Install packages
        working-directory: utils/reply-schema-linter
        run: npm ci --ignore-scripts
      - name: linter
        run: NODE_PATH=utils/reply-schema-linter/node_modules node ./utils/reply_schema_linter.js

